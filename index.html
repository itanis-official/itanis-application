<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Applications ITANIS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #ffffff;
  --s1:    #f8f7f5;
  --s2:    #f0ede8;
  --or:    #ff8c00;
  --orl:   #ffac33;
  --ord:   #cc6e00;
  --og10:  rgba(255,140,0,0.10);
  --og20:  rgba(255,140,0,0.20);
  --og40:  rgba(255,140,0,0.40);
  --wh:    #ffffff;
  --tx:    #1a1a18;
  --tx2:   #444440;
  --bd:    rgba(0,0,0,0.08);
  --fh:    'Syne', sans-serif;
  --fb:    'DM Sans', sans-serif;
}

html, body {
  background: var(--bg); color: var(--tx);
  color: var(--tx);
  font-family: var(--fb);
  -webkit-font-smoothing: antialiased;
  width: 100%;
  overflow-x: hidden;
}

/* ── BG GLOW ── */
.bg-glow {
  position: fixed; pointer-events: none; z-index: 0;
  top: -120px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 400px; border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,140,0,0.05) 0%, transparent 70%);
}

.section {
  position: relative; z-index: 1;
  padding: 2.5rem 2rem 3rem;
  max-width: 900px; margin: 0 auto;
}

/* ── HEADER ── */
.sec-head {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 2.2rem;
}
.sec-line {
  width: 3px; height: 28px; border-radius: 2px;
  background: linear-gradient(180deg, var(--or), transparent);
}
.sec-label {
  font-family: var(--fh);
  font-size: 0.70rem; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--or);
}
.sec-rule {
  flex: 1; height: 1px;
  background: linear-gradient(to right, var(--og20), transparent);
}

/* ── GRID ── */
.apps-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* ── CARD ── */
.app-card {
  position: relative;
  background: var(--s1);
  border: 1px solid var(--bd);
  border-radius: 20px;
  padding: 2rem 1.2rem 1.6rem;
  display: flex; flex-direction: column;
  align-items: center; gap: 1.2rem;
  text-decoration: none; color: inherit;
  overflow: hidden;
  transition: transform .3s cubic-bezier(.34,1.4,.64,1), border-color .3s, box-shadow .3s;
  animation: fadeUp .5s ease both;
}
.app-card:nth-child(1) { animation-delay: .0s; }
.app-card:nth-child(2) { animation-delay: .1s; }
.app-card:nth-child(3) { animation-delay: .2s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* card glow on hover */
.app-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(255,140,0,0.10) 0%, transparent 65%);
  opacity: 0; transition: opacity .3s;
  border-radius: inherit;
}
/* top border accent */
.app-card::after {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 1.5px;
  background: linear-gradient(to right, transparent, var(--or), transparent);
  opacity: 0; transition: opacity .3s;
}

.app-card:hover {
  transform: translateY(-6px);
  border-color: var(--og40);
  box-shadow: 0 20px 50px rgba(0,0,0,0.3), 0 0 30px rgba(255,140,0,0.08);
}
.app-card:hover::before { opacity: 1; }
.app-card:hover::after  { opacity: 1; }
.app-card:hover .icon-wrap { transform: scale(1.08); }
.app-card:hover .app-name  { color: var(--orl); }
.app-card:active { transform: translateY(-3px) scale(0.98); }

/* ── ICON WRAP ── */
.icon-wrap {
  width: 80px; height: 80px;
  border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 1;
  transition: transform .3s cubic-bezier(.34,1.4,.64,1);
}

/* ODOO */
.icon-wrap.odoo {
  background: linear-gradient(135deg, #2d1a4a 0%, #1a0f2e 100%);
  border: 1px solid rgba(168,85,247,0.25);
  box-shadow: 0 4px 20px rgba(168,85,247,0.15);
}
.app-card:hover .icon-wrap.odoo {
  box-shadow: 0 8px 30px rgba(168,85,247,0.25);
}

/* ERP */
.icon-wrap.erp {
  background: linear-gradient(135deg, #1a1a18 0%, #0c0c0a 100%);
  border: 1px solid rgba(255,140,0,0.25);
  box-shadow: 0 4px 20px rgba(255,140,0,0.10);
}
.app-card:hover .icon-wrap.erp {
  box-shadow: 0 8px 30px rgba(255,140,0,0.20);
}

/* WEB */
.icon-wrap.web {
  background: linear-gradient(135deg, #2a1200 0%, #180a00 100%);
  border: 1px solid rgba(255,140,0,0.25);
  box-shadow: 0 4px 20px rgba(255,80,0,0.12);
}
.app-card:hover .icon-wrap.web {
  box-shadow: 0 8px 30px rgba(255,80,0,0.22);
}

/* ── NAME ── */
.app-name {
  font-family: var(--fh);
  font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--tx2);
  transition: color .3s; z-index: 1;
}

/* ── ARROW ── */
.app-arrow {
  position: absolute; bottom: 1rem; right: 1rem;
  width: 24px; height: 24px; border-radius: 50%;
  border: 1px solid var(--bd);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: translate(4px, -4px);
  transition: opacity .25s, transform .25s, border-color .25s;
}
.app-arrow svg { width: 10px; height: 10px; stroke: var(--or); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.app-card:hover .app-arrow {
  opacity: 1; transform: translate(0,0);
  border-color: var(--og40);
}

/* ── RESPONSIVE ── */
@media (max-width: 560px) {
  .section { padding: 1.5rem 1rem 2rem; }
  .apps-grid { gap: 10px; }
  .icon-wrap { width: 64px; height: 64px; border-radius: 18px; }
  .app-card { padding: 1.5rem 0.8rem 1.2rem; border-radius: 16px; }
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="section">
  <div class="sec-head">
    <div class="sec-line"></div>
    <span class="sec-label">Applications</span>
    <div class="sec-rule"></div>
  </div>

  <div class="apps-grid">

    <!-- ODOO -->
    <a href="https://odoo.itanis.tn/web/login" target="_blank" class="app-card">
      <div class="icon-wrap odoo">
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
          <circle cx="19" cy="19" r="12" stroke="#a855f7" stroke-width="2.5"/>
          <circle cx="19" cy="19" r="6" fill="#7c3aed" opacity="0.5"/>
          <circle cx="19" cy="19" r="2.5" fill="#c084fc"/>
        </svg>
      </div>
      <span class="app-name">ODOO</span>
      <div class="app-arrow"><svg viewBox="0 0 10 10"><path d="M2 8L8 2M8 2H4M8 2V6"/></svg></div>
    </a>

    <!-- ERP -->
    <a href="https://itanis.sharepoint.com/sites/ITANIS-cloud/Documents%20de%20la%20Socit/Forms/AllItems.aspx" target="_blank" class="app-card">
      <div class="icon-wrap erp">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect x="4" y="6" width="28" height="20" rx="3" stroke="#ff8c00" stroke-width="2"/>
          <path d="M10 14h16M10 19h10" stroke="#ff8c00" stroke-width="2" stroke-linecap="round"/>
          <circle cx="26" cy="19" r="4" stroke="#ffac33" stroke-width="1.8"/>
          <path d="M29 22l2.5 2.5" stroke="#ffac33" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M12 30h12" stroke="#ff8c00" stroke-width="2" stroke-linecap="round"/>
          <path d="M18 26v4" stroke="#ff8c00" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="app-name">ERP</span>
      <div class="app-arrow"><svg viewBox="0 0 10 10"><path d="M2 8L8 2M8 2H4M8 2V6"/></svg></div>
    </a>

    <!-- SITE WEB -->
    <a href="https://www.itanis.tn/" target="_blank" class="app-card">
      <div class="icon-wrap web">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="12" stroke="url(#wg)" stroke-width="2"/>
          <ellipse cx="18" cy="18" rx="5" ry="12" stroke="url(#wg)" stroke-width="1.8"/>
          <path d="M6 18h24" stroke="url(#wg)" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M7.5 12.5h21M7.5 23.5h21" stroke="url(#wg)" stroke-width="1.5" stroke-linecap="round" opacity=".7"/>
          <!-- badge -->
          <circle cx="26" cy="10" r="5" fill="url(#bg2)"/>
          <path d="M24.5 10h3M26 8.5v3" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
          <defs>
            <linearGradient id="wg" x1="6" y1="6" x2="30" y2="30" gradientUnits="userSpaceOnUse">
              <stop stop-color="#ff6b35"/>
              <stop offset="1" stop-color="#ffac33"/>
            </linearGradient>
            <linearGradient id="bg2" x1="21" y1="5" x2="31" y2="15" gradientUnits="userSpaceOnUse">
              <stop stop-color="#ff6b35"/>
              <stop offset="1" stop-color="#ff8c00"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="app-name">Site Web</span>
      <div class="app-arrow"><svg viewBox="0 0 10 10"><path d="M2 8L8 2M8 2H4M8 2V6"/></svg></div>
    </a>

  </div>
</div>

</body>
</html>
